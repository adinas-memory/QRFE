<c-tabs [activeItemKey]="0">
  <c-tabs-list variant="pills">
    <button cTab [itemKey]="0" class="ms-2">List Products</button>
    <button cTab [itemKey]="1" class="ms-2">Add Product</button>
  </c-tabs-list>

  <!-- Products List -->
  <c-tabs-content>
    <c-tab-panel class="p-3" [itemKey]="0">
      <ul class="list-group">
        <li *ngFor="let p of products" class="list-group-item d-flex justify-content-between align-items-start">
          <div class="me-3">
            <div class="d-flex align-items-center gap-2">
              <strong class="text-uppercase">{{ p.restaurantType }}</strong>
              <span class="text-muted small">{{ p.priceAmount | currency : p.priceCurrency }}</span>
            </div>
            <div class="text-muted small mt-1">{{ p.description }}</div>

            <ul class="small mt-2 mb-0">
              <li *ngFor="let k of parseFeatureKeys(p.features)">{{ k | transloco }}</li>
            </ul>
          </div>
          <button class="btn btn-sm btn-outline-primary" type="button" (click)="onEdit(p)">Edit</button>
        </li>
      </ul>
    </c-tab-panel>
  </c-tabs-content>

  <!-- Add Product -->
  <c-tabs-content>
    <c-tab-panel class="p-3" [itemKey]="1">
      <form [formGroup]="addForm" (ngSubmit)="onAdd()" cForm>
        <div class="row">
          <div class="col-md-4 mb-3">
            <label cLabel>Restaurant Type</label>

            <c-dropdown>
              <button cButton cDropdownToggle color="secondary" class="w-100 text-start">
                {{ addForm.value.restaurantType || 'Select restaurant type...' }}
              </button>

              <ul cDropdownMenu class="w-100">
                <li *ngFor="let r of restaurantTypes">
                  <button type="button" cDropdownItem (click)="addForm.get('restaurantType')?.setValue(r.type)">
                    {{ r.type }} ({{ r.maxTables }} tables, {{ r.maxBars }} bars)
                  </button>
                </li>
              </ul>
            </c-dropdown>
          </div>

          <div class="col-md-4 mb-3">
            <label cLabel>Currency</label>

            <c-dropdown>
              <button cButton cDropdownToggle color="secondary" class="w-100 text-start">
                {{ addForm.value.priceCurrency }}
              </button>

              <ul cDropdownMenu class="w-100">
                <li *ngFor="let c of currencies">
                  <button type="button" cDropdownItem (click)="addForm.get('priceCurrency')?.setValue(c)">
                    {{ c }}
                  </button>
                </li>
              </ul>
            </c-dropdown>
          </div>

          <div class="col-md-12 mb-3">
            <label cLabel>Description</label>
            <textarea cFormControl formControlName="description"></textarea>
          </div>

          <div class="col-md-12 mb-3">
            <label cLabel>Features</label>
            <div class="d-flex flex-wrap gap-2">
              <button
                *ngFor="let k of featureKeys"
                type="button"
                class="btn btn-sm"
                [class.btn-outline-secondary]="!hasFeatureKey(k, addForm)"
                [class.btn-secondary]="hasFeatureKey(k, addForm)"
                (click)="toggleFeatureKey(k, addForm)"
              >
                {{ k | transloco }}
              </button>
            </div>
            <div class="form-text mt-2">Stored as JSON array of Transloco keys.</div>
            <textarea cFormControl formControlName="features" class="mt-2" rows="2"></textarea>
          </div>

          <div class="col-md-4 mb-3">
            <label cLabel>Price</label>
            <input type="number" cFormControl formControlName="priceAmount" />
          </div>

          <div class="col-md-4 mb-3">
            <label cLabel>Interval</label>
            <input cFormControl formControlName="subscriptionInterval" />
          </div>

          <div class="col-md-12 mb-3">
            <label cLabel>Usage Type</label>
            <input cFormControl formControlName="usageType" />
          </div>
        </div>

        <button class="btn btn-primary" type="submit" [disabled]="addForm.invalid">Create</button>
      </form>
    </c-tab-panel>
  </c-tabs-content>

  <c-toaster class="p-3" position="fixed" [placement]="placement" />
</c-tabs>

<!-- Edit Modal -->
<c-modal [(visible)]="editModalVisible" alignment="center" size="lg">
  <c-modal-header>
    <h5 cModalTitle>Edit Product</h5>
    <button type="button" class="btn-close" (click)="editModalVisible = false"></button>
  </c-modal-header>

  <c-modal-body>
    <form [formGroup]="editForm" cForm>
      <label cLabel>Restaurant Type</label>
      <input cFormControl formControlName="restaurantType" readonly />

      <label cLabel>Description</label>
      <textarea cFormControl formControlName="description"></textarea>

      <label cLabel>Features</label>
      <div class="d-flex flex-wrap gap-2 mb-2">
        <button
          *ngFor="let k of featureKeys"
          type="button"
          class="btn btn-sm"
          [class.btn-outline-secondary]="!hasFeatureKey(k, editForm)"
          [class.btn-secondary]="hasFeatureKey(k, editForm)"
          (click)="toggleFeatureKey(k, editForm)"
        >
          {{ k | transloco }}
        </button>
      </div>
      <textarea cFormControl formControlName="features" rows="2"></textarea>

      <label cLabel>Price</label>
      <input type="number" cFormControl formControlName="priceAmount" />
    </form>
  </c-modal-body>

  <c-modal-footer>
    <button class="btn btn-secondary" (click)="editModalVisible = false">Cancel</button>
    <button class="btn btn-primary" (click)="onSaveEdit()" [disabled]="editForm.invalid">Save</button>
  </c-modal-footer>
</c-modal>
