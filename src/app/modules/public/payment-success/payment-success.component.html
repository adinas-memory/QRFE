<c-container class="py-5">
  <c-card class="mx-auto shadow-sm" style="max-width: 520px;">
    <c-card-body class="p-4">
      <c-alert color="success" class="mb-3">
        <div class="fw-semibold">{{ 'payment.success.title' | transloco }}</div>
        <div class="small">{{ 'payment.success.body' | transloco }}</div>
      </c-alert>

      <div class="d-flex gap-2 align-items-center justify-content-between">
        <a cButton color="primary" [routerLink]="['/login']">
          {{ 'payment.success.cta' | transloco }}
        </a>
        <div class="text-muted small">
          {{ secondsLeft }}s
        </div>
      </div>
    </c-card-body>
  </c-card>
</c-container>
