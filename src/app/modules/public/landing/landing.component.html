
<c-row>
  @for (card of cards; track card.restaurantType) {
  <c-col [sm]="4" [md]="12" [lg]="6">
    <c-card class="mb-4">
      <c-card-body>
        <h5 cCardTitle>{{ card.features }}</h5>
        <p cCardText>{{ card.description }}</p>
        <button cButton color="primary">
          {{ card.priceAmount }} {{ card.priceCurrency }} / {{ card.subscriptionInterval }}
        </button>
      </c-card-body>
    </c-card>
  </c-col>
}
</c-row>
