<div class="public-auth">
  <c-container>
    <c-row class="justify-content-center">
      <c-col [xs]="12" [md]="10" [lg]="9" [xl]="8">
        <c-card class="auth-card shadow-sm">
          <c-card-body class="p-4 p-md-5">
            <div class="d-flex align-items-center justify-content-between mb-3">
              <div>
                <div class="text-muted small">U.R.S.</div>
                <h1 class="h3 mb-0">Restaurant setup</h1>
              </div>
              <a routerLink="/" class="small text-decoration-none">Back</a>
            </div>

            <p class="text-muted mb-4">Complete your restaurant details before checkout.</p>

            <form [formGroup]="restaurantSetupForm" (ngSubmit)="onSubmit()" cForm>
              <c-row class="g-3">
                <c-col [xs]="12" [md]="6">
                  <label cLabel for="restaurantName">Restaurant name</label>
                  <input formControlName="restaurantName" cFormControl id="restaurantName" />
                </c-col>
                <c-col [xs]="12" [md]="6">
                  <label cLabel for="registrationNumber">Registration number</label>
                  <input formControlName="registrationNumber" cFormControl id="registrationNumber" />
                </c-col>
                <c-col [xs]="12" [md]="6">
                  <label cLabel for="city">City</label>
                  <input formControlName="city" cFormControl id="city" />
                </c-col>
                <c-col [xs]="12" [md]="4">
                  <label cLabel for="country">Country</label>
                  <select formControlName="country" cSelect id="country">
                    <option value="">Choose...</option>
                    <option value="Romania">Romania</option>
                    <option value="United Kingdom">United Kingdom</option>
                    <option value="Italy">Italy</option>
                    <option value="France">France</option>
                    <option value="Spain">Spain</option>
                    <option value="Germany">Germany</option>
                    <option value="Sweden">Sweden</option>
                  </select>
                </c-col>
                <c-col [xs]="12" [md]="2">
                  <label cLabel for="zip">ZIP</label>
                  <input formControlName="zip" cFormControl id="zip" />
                </c-col>
                <c-col [xs]="12">
                  <label cLabel for="address">Restaurant address</label>
                  <input formControlName="address" cFormControl id="address" placeholder="Street, number" />
                </c-col>

                <c-col [xs]="12">
                  <c-form-check>
                    <input
                      formControlName="checkAddress"
                      cFormCheckInput
                      id="gridCheck"
                      name="gridCheck"
                      type="checkbox"
                    />
                    <label cFormCheckLabel for="gridCheck">
                      Billing address is the same as restaurant address
                    </label>
                  </c-form-check>
                </c-col>

                <c-col [xs]="12">
                  <label cLabel for="billingAddress">Billing address</label>
                  <input
                    formControlName="billingAddress"
                    cFormControl
                    id="billingAddress"
                    placeholder="If different from restaurant address"
                  />
                </c-col>
              </c-row>

              <div class="d-grid gap-2 mt-4">
                <button cButton color="info" variant="outline" type="submit">Continue to payment</button>
              </div>
            </form>
          </c-card-body>
        </c-card>
      </c-col>
    </c-row>
  </c-container>
</div>
