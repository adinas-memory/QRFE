<c-container fluid>
  <h2>Restaurant Setup</h2>
  <form
    [formGroup]="restaurantSetupForm"
    (ngSubmit)="onSubmit()"
    cForm
    class="row g-3"
  >
    <c-col [md]="6">
      <label cLabel for="restaurantName">Restaurant Name</label>
      <input formControlName="restaurantName" cFormControl id="restaurantName" />
    </c-col>
    <c-col [md]="6">
      <label cLabel for="registrationNumber">Registration Number</label>
      <input formControlName="registrationNumber" cFormControl id="registrationNumber" />
    </c-col>
    <c-col [md]="6">
      <label cLabel for="city">City</label>
      <input formControlName="city" cFormControl id="city" />
    </c-col>
    <c-col [md]="4">
      <label cLabel for="country">Country</label>
      <select formControlName="country" cSelect id="state">
        <option value="">Choose...</option>
        <option value="Alabama">Alabama</option>
        <option value="Alaska">Alaska</option>
        <option value="Arizona">Arizona</option>
        <option value="Arkansas">Arkansas</option>
        <option value="California">California</option>
        <!-- Add more states as needed -->
      </select>
    </c-col>
    <c-col [md]="2">
      <label cLabel for="zip">Zip</label>
      <input formControlName="zip" cFormControl id="zip" />
    </c-col>
    <c-col [xs]="12">
      <label cLabel for="inputAddress">Restaurant Address</label>
      <input formControlName="address" cFormControl id="inputAddress" placeholder="1234 Main St" />
    </c-col>
    <c-col [xs]="12">
      <c-form-check>
        <input
          formControlName="checkAddress"
          cFormCheckInput
          id="gridCheck"
          name="gridCheck"
          type="checkbox"
        />
        <label cFormCheckLabel for="gridCheck"
          >Billing address is the same with Restaurant Address</label
        >
      </c-form-check>
    </c-col>
    <c-col [xs]="12">
      <label cLabel for="billingAddress">Billing Address</label>
      <input
        formControlName="billingAddress"
        cFormControl
        id="billingAddress"
        placeholder="Apartment, studio, or floor"
      />
    </c-col>
    <c-col [xs]="12">
      <button cButton type="submit">To Payment</button>
    </c-col>
  </form>
</c-container>
