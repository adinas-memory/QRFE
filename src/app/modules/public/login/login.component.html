<div class="public-auth">
  <c-container>
    <c-row class="justify-content-center">
      <c-col [xs]="12" [md]="10" [lg]="8" [xl]="7">
        <c-card class="auth-card shadow-sm">
          <c-card-body class="p-4 p-md-5">
            <div class="d-flex align-items-center justify-content-between mb-3">
              <div>
                <div class="text-muted small">U.R.S.</div>
                <h1 class="h3 mb-0">Login</h1>
              </div>
              <a routerLink="/" class="small text-decoration-none">Back</a>
            </div>

            <p class="text-muted mb-4">Sign in to your account</p>

            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" cForm>
              <c-input-group class="mb-3">
                <span cInputGroupText>&#64;</span>
                <input formControlName="email" autoComplete="username" cFormControl placeholder="Email" />
              </c-input-group>
              <c-input-group class="mb-4">
                <span cInputGroupText>
                  <svg cIcon name="cilLockLocked"></svg>
                </span>
                <input
                  formControlName="password"
                  autoComplete="current-password"
                  cFormControl
                  placeholder="Password"
                  type="password"
                />
              </c-input-group>

              <div class="d-grid gap-2">
                <button cButton color="info" variant="outline" type="submit">
                  Login
                </button>
                <button cButton color="light" variant="outline" type="button" routerLink="/register">
                  Create an account
                </button>
              </div>
            </form>
          </c-card-body>
        </c-card>
      </c-col>
    </c-row>
  </c-container>
</div>
