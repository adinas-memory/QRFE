<c-container fluid class="mt-3">
  <c-card>
    <c-card-body>
      <div class="d-flex justify-content-between align-items-center">
        <h4 class="mb-0" i18n>QR links</h4>
        <button cButton color="secondary" (click)="load()" [disabled]="loading" i18n>Refresh</button>
      </div>

      <p class="text-muted mt-2 mb-3" i18n>
        Use these links to open the same public view a QR scan would open.
      </p>

      @if (loading) {
        <div class="text-muted" i18n>Loading…</div>
      }

      @if (!loading && items.length === 0) {
        <c-alert color="info">
          <p class="mb-2" i18n>No tables yet — add tables to generate QR links.</p>
          <a cButton color="primary" [routerLink]="['/manager/manage-tables']" i18n>Add tables</a>
        </c-alert>
      }

      @for (it of items; track it.tableId) {
        <div class="border rounded p-3 mb-2">
          <div class="fw-semibold">{{ it.tableLabel }}</div>
          <div class="small mt-2 d-flex flex-wrap gap-2 align-items-center">
            <a [href]="it.qrUrl" target="_blank" rel="noopener noreferrer">{{ it.qrUrl }}</a>
            <button cButton color="primary" size="sm" (click)="copy(it.qrUrl)" i18n>Copy</button>
          </div>
        </div>
      }
    </c-card-body>
  </c-card>
</c-container>
