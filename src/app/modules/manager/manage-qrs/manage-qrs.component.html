<div class="print-all">
  <button cButton color="primary" (click)="printQrCards()">
    Print All QR Cards
  </button>
</div>

<c-container fluid>
  <c-row class="g-4">
    <c-col *ngFor="let qr of qrCodes" xs="12" sm="6" md="4" lg="4" xl="2">
      <c-card class="qr-card" [attr.data-table]="qr.tableLabel">
        <c-card-body>
          <h5 cCardTitle>{{ qr.tableLabel }}</h5>
          <qrcode
            [qrdata]="qr.qrUrl"
            [width]="200"
            [errorCorrectionLevel]="'M'"
          ></qrcode>
          <p cCardText>
            Scan this code to access the menu for table {{ qr.tableLabel }}.
          </p>
        </c-card-body>
      </c-card>
    </c-col>
  </c-row>
</c-container>
