<c-tabs [activeItemKey]="0">
  <c-tabs-list variant="pills">
    <button cTab [itemKey]="0" class="ms-2">List & Edit the Menu</button>
    <button cTab [itemKey]="1" class="ms-2">Add Menu Item</button>
  </c-tabs-list>
  <c-tabs-content>
    <c-tab-panel class="p-3" [itemKey]="0">
      <c-accordion [flush]="true">
        <c-accordion-item
          *ngFor="let cat of categories"
          #accordionItem="cAccordionItem"
          [visible]="false"
          [hidden]="!groupedMenuItems[cat]?.length"
        >
          <ng-template cTemplateId="accordionHeaderTemplate">
            <button
              (click)="accordionItem.toggleItem()"
              [collapsed]="!accordionItem.visible"
              cAccordionButton
            >
              {{ cat }}
            </button>
          </ng-template>

          <ng-template cTemplateId="accordionBodyTemplate">
            <div class="accordion-body">
              <ul class="list-group">
                <li
                  *ngFor="let item of groupedMenuItems[cat]"
                  class="list-group-item d-flex justify-content-between align-items-center"
                >
                  <div>
                    <strong>{{ item.menuItemName }}</strong>
                    <span *ngIf="item.isAvailable === false" class="badge bg-secondary ms-2">
                      {{ 'menu.availability.unavailableBadge' | transloco }}
                    </span>
                    <span class="text-muted">
                      ({{
                        item.menuItemPriceAmount
                          | currency
                            : item.menuItemPriceCurrency
                            : "symbol"
                            : "1.2-2"
                      }})
                    </span>
                    <div>{{ item.menuItemDescription }}</div>
                  </div>
                  <div class="d-flex align-items-center">
                    <img
                      [src]="item.menuItemIconUrl + '?v=' + forceRefreshAfterUpdate"
                      [alt]="item.category + ', ' + item.menuItemName"
                      width="50"
                      height="50"
                      class="me-2"
                    />
                    <button
                      class="btn btn-sm btn-outline-secondary me-1"
                      (click)="toggleAvailability(item)"
                    >
                      {{
                        (item.isAvailable === false
                          ? 'menu.availability.manager.markAvailable'
                          : 'menu.availability.manager.markUnavailable'
                        ) | transloco
                      }}
                    </button>
                    <button
                      class="btn btn-sm btn-outline-primary me-1"
                      (click)="onEdit(item)"
                    >
                      Edit
                    </button>
                    <button
                      class="btn btn-sm btn-outline-danger"
                      (click)="onDelete(item)"
                    >
                      Delete
                    </button>
                  </div>
                </li>
              </ul>
            </div>
          </ng-template>
        </c-accordion-item>
      </c-accordion>
    </c-tab-panel>
  </c-tabs-content>
  <c-tabs-content>
    <c-tab-panel class="p-3" [itemKey]="1">
      <form
        [formGroup]="menuItemsForm"
        (ngSubmit)="onSubmit()"
        cForm
        class="flex-wrap"
      >
        <div class="mb-3">
          <label cLabel for="menuItemIcon">Upload Image</label>
          <input
            cFormControl
            id="menuItemIcon"
            placeholder="Choose an icon file"
            type="file"
            (change)="onFileSelected($event)"
          />
        </div>
        <div class="mb-3">
          <label cLabel for="menuItemName">Menu Item Name</label>
          <input
            formControlName="menuItemName"
            cFormControl
            id="menuItemName"
            placeholder="Gulasch"
            type="text"
            (blur)="formatMenuItemName()"
          />
        </div>
        <div class="mb-3">
          <label cLabel for="menuItemCategory">Category</label>
          <select
            formControlName="menuItemCategory"
            cFormControl
            id="menuItemCategory"
            cSelect
          >
            <option value="" disabled>Select a category</option>
            <option *ngFor="let cat of categories" [value]="cat">
              {{ cat }}
            </option>
          </select>
        </div>
        <div class="mb-3">
          <label cLabel for="menuItemPriceAmount">Price</label>
          <input
            formControlName="menuItemPriceAmount"
            cFormControl
            id="menuItemPriceAmount"
            placeholder="9.99"
            type="number"
          />
        </div>
        <div class="mb-3">
          <label cLabel for="menuItemDescription">Description</label>
          <input
            formControlName="menuItemDescription"
            cFormControl
            id="menuItemDescription"
            placeholder="Delicious beef goulash with potatoes & rosemary, served with fresh bread."
            type="text"
          />
        </div>
        <button type="submit" class="btn btn-primary me-2">
          {{ selectedItem ? "Update Item" : "Add Item" }}
        </button>
        <button type="button" class="btn btn-secondary" (click)="resetForm()">
          Reset
        </button>
      </form>
    </c-tab-panel>
  </c-tabs-content>
  <c-toaster class="p-3" position="fixed" [placement]="placement" />
</c-tabs>
<!-- Edit Modal -->
<c-modal [(visible)]="editModalVisible" alignment="center" size="lg">
  <c-modal-header>
    <h5 cModalTitle>Edit Menu Item</h5>
    <button type="button" class="btn-close" (click)="closeEditModal()"></button>
  </c-modal-header>
  <c-modal-body>
    <form [formGroup]="menuItemsForm" (ngSubmit)="onUpdate()" cForm>
      <div class="mb-3">
        <label cLabel for="menuItemIconEdit">Upload Image</label>
        <input cFormControl id="menuItemIconEdit" type="file" (change)="onFileSelected($event)" />
      </div>
      <div class="mb-3">
        <label cLabel for="menuItemNameEdit">Menu Item Name</label>
        <input
          formControlName="menuItemName"
          cFormControl
          id="menuItemNameEdit"
          type="text"
          (blur)="formatMenuItemName()"
        />
      </div>
      <div class="mb-3">
        <label cLabel for="menuItemCategoryEdit">Category</label>
        <select formControlName="menuItemCategory" cFormControl id="menuItemCategoryEdit" cSelect>
          <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
        </select>
      </div>
      <div class="mb-3">
        <label cLabel for="menuItemPriceAmountEdit">Price</label>
        <input formControlName="menuItemPriceAmount" cFormControl id="menuItemPriceAmountEdit" type="number" />
      </div>
      <div class="mb-3">
        <label cLabel for="menuItemDescriptionEdit">Description</label>
        <input formControlName="menuItemDescription" cFormControl id="menuItemDescriptionEdit" type="text" />
      </div>
    </form>
  </c-modal-body>
  <c-modal-footer>
    <button type="submit" cButton cButton color="secondary" (click)="onSubmit()">Update Item</button>
      <button type="button" cButton (click)="closeEditModal()" color="primary">Cancel</button>
  </c-modal-footer>
</c-modal>
