<c-row>
  <c-col xs="12">
    <c-card class="mb-4">
      <c-card-header class="d-flex align-items-center justify-content-between">
        <strong>Kitchen</strong>
        <button
          cButton
          color="info"
          variant="outline"
          size="sm"
          (click)="toggleSound()"
        >
          @if (!soundEnabled) {
            Enable sound
          } @else if (soundMuted) {
            Sound: OFF
          } @else {
            Sound: ON
          }
        </button>
      </c-card-header>
      <c-card-body>
        <div *ngIf="orders.length === 0" class="text-muted">
          No active food orders yet.
        </div>

        <table *ngIf="orders.length > 0" cTable hover bordered responsive>
          <thead>
            <tr>
              <th style="width: 64px;"></th>
              <th style="width: 140px;">Table</th>
              <th>Items</th>
              <th style="width: 190px;">Last update</th>
              <th style="width: 170px;"></th>
            </tr>
          </thead>
          <tbody>
            <ng-container *ngFor="let o of orders">
            <tr>
              <td class="text-center">
                <button
                  cButton
                  color="secondary"
                  variant="outline"
                  size="sm"
                  (click)="toggleExpanded(o.tableId)"
                >
                  {{ isExpanded(o.tableId) ? '−' : '+' }}
                </button>
              </td>
              <td class="fw-semibold">
                {{ o.tableName }}
              </td>
              <td>
                <span class="text-muted">{{ o.items.length }} items</span>
              </td>
              <td class="text-muted small">
                {{ o.lastActionAt | date:'short' }}
              </td>
              <td class="text-end">
                <button cButton color="primary" variant="outline" size="sm" (click)="callWaiterForPickup(o.tableId)">
                  Call waiter
                </button>
              </td>
            </tr>
            <tr [ngClass]="isExpanded(o.tableId) ? '' : 'd-none'">
              <td></td>
              <td colspan="4">
                <div class="kitchen-items">
                  <table class="table table-sm mb-0">
                    <thead>
                      <tr>
                        <th>Item</th>
                        <th style="width: 90px;" class="text-end">Qty</th>
                        <th style="width: 140px;">Category</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr
                        *ngFor="let it of o.items"
                        [ngClass]="{
                          'kitchen-added': it.mark?.kind === 'added',
                          'kitchen-updated': it.mark?.kind === 'updated',
                          'kitchen-deleted': it.mark?.kind === 'deleted'
                        }"
                      >
                        <td class="fw-semibold">{{ it.name }}</td>
                        <td class="text-end">{{ it.quantity }}</td>
                        <td class="text-muted">{{ it.category }}</td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </td>
            </tr>
            </ng-container>
          </tbody>
        </table>
      </c-card-body>
    </c-card>
  </c-col>
</c-row>
