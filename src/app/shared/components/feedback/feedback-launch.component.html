@if (showLaunch()) {
  @if (appearance() === 'outline') {
    <button
      type="button"
      cButton
      [color]="outlineColor()"
      variant="outline"
      class="landing-header-btn d-inline-flex align-items-center px-2"
      (click)="open()"
      [attr.aria-label]="'header.sendFeedback' | transloco"
    >
      <svg cIcon name="cilSpeech" size="lg"></svg>
    </button>
  } @else {
    <c-nav-item class="d-flex align-items-center">
      <button
        type="button"
        class="nav-link py-1 px-2 d-inline-flex align-items-center border-0 bg-transparent"
        (click)="open()"
        [attr.aria-label]="'header.sendFeedback' | transloco"
      >
        <svg cIcon name="cilSpeech" size="lg"></svg>
      </button>
    </c-nav-item>
  }
}
