<c-modal
  [visible]="ui.modalVisible()"
  (visibleChange)="ui.setModalVisible($event)"
  alignment="center"
  scrollable
>
  <c-modal-header>
    <h5 cModalTitle>Send feedback</h5>
    <button
      type="button"
      class="btn-close"
      aria-label="Close"
      (click)="close()"
    ></button>
  </c-modal-header>
  <c-modal-body>
    <form [formGroup]="form" (ngSubmit)="submit()" id="feedbackForm">
      <p class="text-body-secondary small mb-3">
        Report a bug or suggest an improvement (max 1000 characters). Your current page is included to help us reproduce issues.
      </p>
      <div class="mb-3">
        <span class="form-label d-block">Type</span>
        <c-form-check class="me-3 d-inline-block">
          <input
            cFormCheckInput
            type="radio"
            formControlName="kind"
            name="fkKind"
            id="fkBug"
            [value]="FeedbackKind.Bug"
          />
          <label cFormCheckLabel for="fkBug">Bug</label>
        </c-form-check>
        <c-form-check class="d-inline-block">
          <input
            cFormCheckInput
            type="radio"
            formControlName="kind"
            name="fkKind"
            id="fkImp"
            [value]="FeedbackKind.Improvement"
          />
          <label cFormCheckLabel for="fkImp">Improvement</label>
        </c-form-check>
      </div>
      <div class="mb-2">
        <label cLabel for="fbMsg">Message</label>
        <textarea
          cFormControl
          id="fbMsg"
          formControlName="message"
          rows="5"
          maxlength="1000"
          placeholder="Describe what happened or what you would like…"
        ></textarea>
        <div class="small text-body-secondary text-end">{{ remainingChars }} left</div>
      </div>
    </form>
  </c-modal-body>
  <c-modal-footer>
    <button cButton color="secondary" variant="outline" type="button" (click)="close()">Cancel</button>
    <button
      cButton
      color="primary"
      type="submit"
      form="feedbackForm"
      [disabled]="submitting || form.invalid"
    >
      @if (submitting) {
        Sending…
      } @else {
        Send
      }
    </button>
  </c-modal-footer>
</c-modal>
