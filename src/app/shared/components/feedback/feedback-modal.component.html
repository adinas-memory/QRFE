<c-modal
  [visible]="ui.modalVisible()"
  (visibleChange)="ui.setModalVisible($event)"
  alignment="center"
  scrollable
>
  <c-modal-header>
    <h5 cModalTitle>{{ 'feedbackModal.title' | transloco }}</h5>
    <button
      type="button"
      class="btn-close"
      [attr.aria-label]="'feedbackModal.closeAria' | transloco"
      (click)="close()"
    ></button>
  </c-modal-header>
  <c-modal-body>
    <form [formGroup]="form" (ngSubmit)="submit()" id="feedbackForm">
      <p class="text-body-secondary small mb-3">
        {{ 'feedbackModal.intro' | transloco }}
      </p>
      <div class="mb-3">
        <span class="form-label d-block">{{ 'feedbackModal.type' | transloco }}</span>
        <c-form-check class="me-3 d-inline-block">
          <input
            cFormCheckInput
            type="radio"
            formControlName="kind"
            name="kind"
            id="fkBug"
            [value]="FeedbackKind.Bug"
          />
          <label cFormCheckLabel for="fkBug">{{ 'feedbackModal.bug' | transloco }}</label>
        </c-form-check>
        <c-form-check class="d-inline-block">
          <input
            cFormCheckInput
            type="radio"
            formControlName="kind"
            name="kind"
            id="fkImp"
            [value]="FeedbackKind.Improvement"
          />
          <label cFormCheckLabel for="fkImp">{{ 'feedbackModal.improvement' | transloco }}</label>
        </c-form-check>
      </div>
      <div class="mb-2">
        <label cLabel for="fbMsg">{{ 'feedbackModal.message' | transloco }}</label>
        <textarea
          cFormControl
          id="fbMsg"
          formControlName="message"
          rows="5"
          maxlength="1000"
          [placeholder]="'feedbackModal.placeholder' | transloco"
        ></textarea>
        <div class="small text-body-secondary text-end">{{ 'feedbackModal.charsLeft' | transloco: { count: remainingChars } }}</div>
      </div>
    </form>
  </c-modal-body>
  <c-modal-footer>
    <button cButton color="secondary" variant="outline" type="button" (click)="close()">{{ 'feedbackModal.cancel' | transloco }}</button>
    <button
      cButton
      color="primary"
      type="submit"
      form="feedbackForm"
      [disabled]="submitting || form.invalid"
    >
      @if (submitting) {
        {{ 'feedbackModal.sending' | transloco }}
      } @else {
        {{ 'feedbackModal.send' | transloco }}
      }
    </button>
  </c-modal-footer>
</c-modal>
