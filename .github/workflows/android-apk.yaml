name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, production]

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      CAPACITOR_LAN_IP: "192.168.43.142"
      # Public APK distribution repo (FAQ download target).
      APK_RELEASE_REPO: adrian-badulescu/URS-android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"
          yes | sdkmanager --licenses >/dev/null || true

      - name: Install npm dependencies
        run: npm ci

      - name: Resolve build flavor
        id: flavor
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          if [[ "${{ github.ref_name }}" == "production" ]]; then
            echo "kind=prod" >> "$GITHUB_OUTPUT"
            echo "api_url=https://universalrestaurant.systems" >> "$GITHUB_OUTPUT"
            echo "apk_name=URS-POS-prod-${SHORT_SHA}.apk" >> "$GITHUB_OUTPUT"
            echo "tag=apk-prod-r${{ github.run_number }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "title=POS APK production (r${{ github.run_number }})" >> "$GITHUB_OUTPUT"
          else
            echo "kind=lan" >> "$GITHUB_OUTPUT"
            echo "api_url=http://${CAPACITOR_LAN_IP}" >> "$GITHUB_OUTPUT"
            echo "apk_name=URS-POS-lan-${SHORT_SHA}.apk" >> "$GITHUB_OUTPUT"
            echo "tag=apk-lan-r${{ github.run_number }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "title=POS APK LAN ${CAPACITOR_LAN_IP} (r${{ github.run_number }})" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump versionCode from run number
        run: |
          sed -i "s/versionCode [0-9]*/versionCode ${{ github.run_number }}/" android/app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"1.0.${{ github.run_number }}\"/" android/app/build.gradle
          grep -E 'versionCode|versionName' android/app/build.gradle

      - name: Capacitor sync (LAN)
        if: steps.flavor.outputs.kind == 'lan'
        run: npm run android:lan-apk

      - name: Capacitor sync (production)
        if: steps.flavor.outputs.kind == 'prod'
        run: npm run android:prod

      - name: Assemble release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Stage APK for publish
        run: |
          SRC="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          if [[ ! -f "$SRC" ]]; then
            SRC="$(find android/app/build/outputs/apk/release -name '*.apk' | head -n 1)"
          fi
          if [[ -z "$SRC" || ! -f "$SRC" ]]; then
            echo "::error::No release APK found under android/app/build/outputs/apk/release"
            ls -laR android/app/build/outputs/apk || true
            exit 1
          fi
          mkdir -p dist-apk
          DEST="dist-apk/${{ steps.flavor.outputs.apk_name }}"
          cp "$SRC" "$DEST"
          # Stable name for FAQ: …/releases/latest/download/URS-POS-prod.apk
          if [[ "${{ steps.flavor.outputs.kind }}" == "prod" ]]; then
            cp "$SRC" "dist-apk/URS-POS-prod.apk"
          fi
          echo "Built APK: $DEST ($(du -h "$DEST" | cut -f1))"
          ls -la dist-apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.flavor.outputs.kind == 'prod' && 'urs-pos-apk-prod' || 'urs-pos-apk-lan' }}
          path: dist-apk/*
          retention-days: 14

      - name: Require URS_ANDROID_RELEASE_TOKEN
        run: |
          if [[ -z "${{ secrets.URS_ANDROID_RELEASE_TOKEN }}" ]]; then
            echo "::error::Missing secret URS_ANDROID_RELEASE_TOKEN (PAT with contents:write on ${APK_RELEASE_REPO})."
            exit 1
          fi

      - name: Publish APK release to URS-android
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.APK_RELEASE_REPO }}
          token: ${{ secrets.URS_ANDROID_RELEASE_TOKEN }}
          tag_name: ${{ steps.flavor.outputs.tag }}
          name: ${{ steps.flavor.outputs.title }}
          prerelease: ${{ steps.flavor.outputs.prerelease }}
          target_commitish: main
          make_latest: ${{ steps.flavor.outputs.kind == 'prod' && 'true' || 'false' }}
          files: dist-apk/*
          body: |
            Capacitor POS APK (unsigned — install via unknown sources).

            Built from **QRFE** `${{ github.repository }}` @ `${{ github.sha }}`
            (`${{ github.ref_name }}`).

            - **API:** `${{ steps.flavor.outputs.api_url }}`
            - **versionCode:** `${{ github.run_number }}`

            Latest production download:
            `https://github.com/adrian-badulescu/URS-android/releases/latest/download/URS-POS-prod.apk`
