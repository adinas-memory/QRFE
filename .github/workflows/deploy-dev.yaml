name: Deploy Angular Frontend to LAN Dev Server

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm ci

    - name: Build Angular app (devhost)
      run: npm run build -- --configuration devhost

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: frontend-package-dev
        path: dist/**

  verify-runner:
    runs-on: self-hosted
    steps:
    - name: Confirm self-hosted runner is reachable
      run: |
        echo "Runner host: $(hostname)"
        echo "Runner user: $(whoami)"
        command -v ssh && command -v scp && command -v tar

  deploy:
    runs-on: self-hosted
    needs: [build, verify-runner]
    env:
      RUN: ${{ github.run_number }}
      SSH_PORT: ${{ secrets.DEV_SERVER_SSH_PORT }}

    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: frontend-package-dev
        path: .

    - name: Inspect workspace
      run: ls -R .

    - name: Configure SSH (no Docker — native ssh/scp)
      run: |
        mkdir -p ~/.ssh
        printf '%s\n' "${{ secrets.DEV_SERVER_SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        PORT="${SSH_PORT:-22}"
        ssh-keyscan -p "$PORT" -H "${{ secrets.DEV_SERVER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
        cat > ~/.ssh/config <<EOF
        Host dev-deploy
          HostName ${{ secrets.DEV_SERVER_HOST }}
          User ${{ secrets.DEV_SERVER_USER }}
          Port ${PORT}
          IdentityFile ~/.ssh/deploy_key
          IdentitiesOnly yes
          StrictHostKeyChecking accept-new
        EOF
        chmod 600 ~/.ssh/config

    - name: Build tarball and deploy frontend
      run: |
        set -euo pipefail
        RELEASE="/home/adi/releases/frontend-${RUN}"

        if [ -d browser ]; then
          BROWSER=browser
        elif [ -d qrfe/browser ]; then
          BROWSER=qrfe/browser
        else
          echo "browser output not found"; ls -la; exit 1
        fi

        tar -czf frontend.tar.gz -C "$BROWSER" .

        ssh dev-deploy "rm -rf ${RELEASE} && mkdir -p ${RELEASE}"
        scp frontend.tar.gz "dev-deploy:${RELEASE}/"

        ssh dev-deploy "bash -s" <<REMOTE
        set -euo pipefail
        cd ${RELEASE}
        tar -xzf frontend.tar.gz
        rm frontend.tar.gz
        sudo rm -rf /var/www/qrfe-dev
        sudo ln -sfn ${RELEASE} /var/www/qrfe-dev
        sudo nginx -t && sudo systemctl reload nginx
        REMOTE
