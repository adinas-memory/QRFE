name: Deploy Angular Frontend to LAN Dev Server

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm ci

    - name: Build Angular app (devhost)
      run: npm run build -- --configuration devhost

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: frontend-package-dev
        path: dist/**

  deploy:
    # Runner service zena-dina.dev runs ON this host — deploy via local paths, not SSH loopback.
    runs-on: self-hosted
    needs: build
    env:
      RUN: ${{ github.run_number }}

    steps:
    - name: Runner check
      run: |
        echo "hostname=$(hostname)"
        echo "user=$(whoami)"
        echo "run_number=${RUN}"
        command -v tar

    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: frontend-package-dev
        path: .

    - name: Inspect artifact layout
      run: |
        ls -la
        ls -la browser 2>/dev/null || true
        ls -la dist/browser 2>/dev/null || true

    - name: Deploy to /var/www/qrfe-dev (local)
      run: |
        set -euo pipefail
        RELEASE="/home/adi/releases/frontend-${RUN}"

        if [ -d browser ]; then
          BROWSER=browser
        elif [ -d dist/browser ]; then
          BROWSER=dist/browser
        elif [ -f index.html ]; then
          BROWSER=.
        elif [ -d qrfe/browser ]; then
          BROWSER=qrfe/browser
        else
          echo "::error::browser output not found after artifact download"
          ls -la
          exit 1
        fi

        echo "Packaging from: ${BROWSER}"
        test -f "${BROWSER}/index.html"

        rm -rf "${RELEASE}"
        mkdir -p "${RELEASE}"
        tar -cf - -C "${BROWSER}" . | tar -xf - -C "${RELEASE}"

        sudo -n rm -rf /var/www/qrfe-dev
        sudo -n ln -sfn "${RELEASE}" /var/www/qrfe-dev
        sudo -n chown -h "$(whoami):$(whoami)" /var/www/qrfe-dev 2>/dev/null || true
        sudo -n /usr/sbin/nginx -t
        sudo -n /usr/bin/systemctl reload nginx

        ACTIVE="$(readlink -f /var/www/qrfe-dev)"
        echo "Active release: ${ACTIVE}"
        test "${ACTIVE}" = "${RELEASE}"
        test -f "${ACTIVE}/index.html"
