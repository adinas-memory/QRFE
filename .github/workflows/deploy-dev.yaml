name: Deploy Angular Frontend to LAN Dev Server

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm ci

    - name: Build Angular app (devhost)
      run: npm run build -- --configuration devhost

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: frontend-package-dev
        path: dist/browser

  verify-runner:
    runs-on: self-hosted
    steps:
    - name: Confirm self-hosted runner is reachable
      run: |
        echo "Runner host: $(hostname)"
        echo "Runner user: $(whoami)"
        command -v ssh && command -v scp && command -v tar

  deploy:
    runs-on: self-hosted
    needs: [build, verify-runner]
    env:
      RUN: ${{ github.run_number }}

    steps:
    - name: Resolve deploy target (secrets or variables)
      env:
        SECRET_HOST: ${{ secrets.DEV_SERVER_HOST }}
        SECRET_USER: ${{ secrets.DEV_SERVER_USER }}
        SECRET_PORT: ${{ secrets.DEV_SERVER_SSH_PORT }}
        VARS_HOST: ${{ vars.DEV_SERVER_HOST }}
        VARS_USER: ${{ vars.DEV_SERVER_USER }}
        VARS_PORT: ${{ vars.DEV_SERVER_SSH_PORT }}
      run: |
        pick() { if [[ -n "${1}" ]]; then echo "${1}"; else echo "${2}"; fi; }
        HOST=$(pick "$SECRET_HOST" "$VARS_HOST")
        USER=$(pick "$SECRET_USER" "$VARS_USER")
        PORT=$(pick "$SECRET_PORT" "$VARS_PORT")
        PORT="${PORT:-22}"

        missing=()
        [[ -n "$SECRET_HOST" || -n "$VARS_HOST" ]] || missing+=("DEV_SERVER_HOST")
        [[ -n "$SECRET_USER" || -n "$VARS_USER" ]] || missing+=("DEV_SERVER_USER")
        [[ -n "${{ secrets.DEV_SERVER_SSH_KEY }}" ]] || missing+=("DEV_SERVER_SSH_KEY")

        if [[ ${#missing[@]} -gt 0 ]]; then
          echo "::error::Missing for this repository (QRFE): ${missing[*]}"
          exit 1
        fi

        echo "DEV_HOST=$HOST" >> "$GITHUB_ENV"
        echo "DEV_USER=$USER" >> "$GITHUB_ENV"
        echo "DEV_PORT=$PORT" >> "$GITHUB_ENV"
        echo "Using deploy target host=$HOST user=$USER port=$PORT"

    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: frontend-package-dev
        path: .

    - name: Inspect workspace
      run: ls -R .

    - name: Configure SSH (no Docker — native ssh/scp)
      run: |
        mkdir -p ~/.ssh
        printf '%s\n' "${{ secrets.DEV_SERVER_SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        PORT="${DEV_PORT:-22}"
        ssh-keyscan -p "$PORT" -H "${DEV_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true
        cat > ~/.ssh/config <<EOF
        Host dev-deploy
          HostName ${DEV_HOST}
          User ${DEV_USER}
          Port ${PORT}
          IdentityFile ~/.ssh/deploy_key
          IdentitiesOnly yes
          StrictHostKeyChecking accept-new
        EOF
        chmod 600 ~/.ssh/config

    - name: Verify SSH user and passwordless sudo
      run: |
        echo "ssh_target_host=${DEV_HOST}"
        echo "ssh_config_user=${DEV_USER}"
        ACTUAL=$(ssh dev-deploy 'whoami' | tr -d '\r\n')
        echo "ssh_remote_whoami=${ACTUAL}"
        if [[ "${ACTUAL}" != "${DEV_USER}" ]]; then
          echo "::error::SSH user mismatch: connected as '${ACTUAL}', expected DEV_SERVER_USER='${DEV_USER}'"
          exit 1
        fi
        ssh dev-deploy 'sudo -n true'
        echo "NOPASSWD sudo: OK"

    - name: Build tarball and deploy frontend
      run: |
        set -euo pipefail
        RELEASE="/home/adi/releases/frontend-${RUN}"

        if [ -f index.html ]; then
          BROWSER=.
        elif [ -d dist/browser ]; then
          BROWSER=dist/browser
        elif [ -d browser ]; then
          BROWSER=browser
        elif [ -d qrfe/browser ]; then
          BROWSER=qrfe/browser
        else
          echo "::error::Angular browser output not found"
          ls -la
          ls -la dist 2>/dev/null || true
          exit 1
        fi
        echo "Packaging from: ${BROWSER}"
        test -f "${BROWSER}/index.html"
        tar -czf frontend.tar.gz -C "$BROWSER" .

        ssh dev-deploy "rm -rf ${RELEASE} && mkdir -p ${RELEASE}"
        scp frontend.tar.gz "dev-deploy:${RELEASE}/"

        ssh dev-deploy "bash -s" <<REMOTE
        set -euo pipefail
        cd ${RELEASE}
        tar -xzf frontend.tar.gz
        rm frontend.tar.gz
        sudo -n rm -rf /var/www/qrfe-dev
        sudo -n ln -sfn ${RELEASE} /var/www/qrfe-dev
        sudo -n chown -h ${USER}:${USER} /var/www/qrfe-dev 2>/dev/null || true
        sudo -n /usr/sbin/nginx -t
        sudo -n /usr/bin/systemctl reload nginx
        echo "Active release: \$(readlink -f /var/www/qrfe-dev)"
        ls -la /var/www/qrfe-dev/index.html
        REMOTE

    - name: Verify deployed release matches this run
      run: |
        ACTIVE=$(ssh dev-deploy "readlink -f /var/www/qrfe-dev")
        echo "nginx root -> ${ACTIVE}"
        if [[ "${ACTIVE}" != "/home/adi/releases/frontend-${RUN}" ]]; then
          echo "::error::Symlink mismatch: expected /home/adi/releases/frontend-${RUN}, got ${ACTIVE}"
          exit 1
        fi
        ssh dev-deploy "test -f ${ACTIVE}/index.html && test -f ${ACTIVE}/ngsw.json && echo 'has ngsw' || echo 'no ngsw (ok if SW disabled)'"
